# self-fix（publish_paid_note.py に恒久実装・差分と根拠）

**原因（DOM実測）**：note の価格欄は React 制御の `<input type=text placeholder="300">`。旧実装の Playwright `fill()` は
onChange を発火させず、アプリ状態が既定300のまま＝「価格未確定」で毎回下書き止まりになっていた（前便で EN¥100 が
is_limited=False/price=300 で止まった真因）。**is_limited は判定に使えない**：正しく有料公開された記事でも v3 API は
is_limited=False を返す（¥980本 n6e7ca70475c8 で実測）。有料が効いているかの真の判定は **price と can_read=False**。

**修正内容**（自己修復権限＝価格・境界ロジックの範囲。安全ガードは強化方向のみ）：
1. `_try_set_price_on_publish()`：`fill()` を廃し **実マウスclick→Meta+A/Ctrl+A→Backspace→keyboard.type→Tab(blur)** に置換。
   `paid radio が checked` かつ `価格input==price` の両方をDOM検証して初めて True。settle待ち＋scroll_into_view＋**検証リトライ最大3回**で堅牢化。
2. `_confirm_paid_boundary()` を新設し価格設定と分離。**開くと入力欄が畳まれ価格を再検証できなくなる**ため、
   順序を「価格→検証→境界確定→投稿」に固定（境界確定後に「投稿する」が出現）。
3. 公開ゲートを `paywall_ok and price_ok and boundary_ok` の**3点確定**に強化（旧＝2点）。
4. `_verify_paid_published()` を新設：公開直後に v3 API で **price一致・can_read=False・published** を検証（belt-and-suspenders）。
   ⇒ ownerの★絶対条件「price=100 かつ 有料が効いている時だけ公開」を、実在しない is_limited=True でなく **price+can_read** で厳守。

**検証**：改修版で EN¥100 の fresh フローは（/publish/ 未settleで）price 検証に失敗→**安全に下書き止め**（＝ガードは正常作動）。
その後、既ビルド済み下書きに対して /publish/ ページ上で改修ロジックを適用し **両方とも公開成功＋v3実測OK**。
fresh フローの settle 対策としてリトライ/scroll を追加済（次便の cron 自動公開で最終確認したい）。

