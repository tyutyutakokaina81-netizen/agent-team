# 自己修復（差分と根拠・codeレビュー依頼）

1. **publish_paid_note.py（下書き本文スクランブル修正）**
   - 旧: `editor2.click(); page.keyboard.press("End")` の後に有料本文をタイプ → カーソルが本文中間に飛び、有料本文が無料パートに混入（実測: 破損下書き ncdcbf437aa5d で `第1章` が無料teaserの途中に割り込み）。
   - 新: JS で `selectNodeContents(ed).collapse(false)` により編集領域の**真の末尾**へキャレット移動→タイプ。空の使い捨て下書きで `FREE / PAYWALL-LINE / PAID` の順序保証を実証。
2. **publish_paid_note.py + complete_paid_draft.py（投稿ボタン出現手順を確定実装）**
   - `/publish/` で「投稿する」が出ない根因＝有料ライン未確定。**「有料エリア設定」を開く→「このラインより先を有料にする」**（既存 PAYWALL-LINE をそのまま確定＝冪等。往復テストで pw位置=22 が不変を確認）を挟むと「投稿する」が出現。両スクリプトに実装。
3. **publish_to_note.py（無料公開の /publish 遷移フォールバック）**
   - 稀に「公開に進む」が `/publish/` へ遷移せず投稿ボタンに到達できない事象（ガラス美術館で発生）。→ 遷移しない場合に **`/notes/<id>/publish/` へ直接goto** する待機/入口URLの機械補正を追加。以降の岩ガキ・称名滝はワンショットで公開成功。
   - ※いずれも公開ロジック・安全ガード・重複ゲート・価格処理は不変。安全側（境界/価格が未確定なら下書き停止）を維持。

