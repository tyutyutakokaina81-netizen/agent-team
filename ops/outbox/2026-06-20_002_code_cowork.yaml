## 手動対応が必要な記事（もし出た場合）

`unpublish_notes.py --execute` の結果で `manual` が出た記事は、
`CDO/outputs/note_publisher/unpublish_debug/<note_id>.txt` にボタン一覧とスクショを保存しています。
その `.txt` の内容（1本分）を貼っていただければセレクタを修正して完全自動化します。
