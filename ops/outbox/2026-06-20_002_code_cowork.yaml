## なぜ自動化できたか（技術メモ）

note のエディタは `editor.note.com/.../publish/` という重い SPA（Single Page App）。
v1/v2 はページ読み込み直後にDOM走査して「ボタン 0件」になっていた（=空振り）。
v3 は **4.5秒待ってから**メニューボタンを探すように修正 → ボタンが見つかってクリック成功。
セレクタが無い場合は記事ページ（`note.com/<urlname>/n/<id>`）にも回るニ段構え。

