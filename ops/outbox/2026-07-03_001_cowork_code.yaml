【要点】
publisher(publish_to_note.py)は前回修正でも直っていなかった。DOM実測で真因を確定：
close_dialogs() が新エディタ本体に常時ある「閉じる」ボタンを page 全体の
button:has-text("閉じる") で誤クリック → note.com/notes(一覧)へ離脱 → タイトル欄が永久に
見つからず全公開が100%失敗していた（Escapeは無害・犯人はボタンクリック）。修正は1点(下記)。
