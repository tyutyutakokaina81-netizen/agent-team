★真因確定（DOM実測・再現100%）
・症状: publish_to_note.py --draft を4回実行→4回とも「タイトル入力欄が見つかりません／現在のURL: https://note.com/notes」で失敗。
・切り分け: publisherの入口ループ(load_context/TITLE_SELECTOR/候補URL)を丸ごと同一再現した診断スクリプトは4回とも成功
  (editor.note.com/new → editor.note.com/notes/<id>/edit に遷移、textarea[placeholder="記事タイトル"]=1, div.ProseMirror=1 を確実取得)。
  唯一の差分＝close_dialogs()の「ボタンクリック部」だけ再現していなかった点。
・確定実測: editor.note.com/notes/<id>/edit 表示中に button:has-text("閉じる")→is_visible=True(エディタ本体の閉じるボタン)。
  クリックすると url が https://note.com/notes に遷移(=エディタを閉じ一覧へ戻る)。publisherはgoto直後 close_dialogs()を無条件呼び→自爆。
・補足: 「あとで/スキップ/今はしない/×」は全て is_visible=False(実在せず無関係)。Escape×3は無害。
  redirect(/new→/edit)は domcontentloaded+1500msで十分間に合う(networkidle問題は前回修正で解消済)。

★修正案（code反映依頼・最小1点）
publish_to_note.py の close_dialogs() のボタンクリックを「モーダル/ダイアログ内」に限定。エディタ本体のボタンを page 全体から拾わない。
  変更前: b = page.locator(f'button:has-text("{label}")').first
  変更後: DIALOG_SCOPE='[role="dialog"], [aria-modal="true"], .ReactModal__Content, .m-modal, .o-modal'
          b = page.locator(f'{DIALOG_SCOPE} button:has-text("{label}")').first
推奨(任意): 入口ループで先にタイトル欄を探し、見つかったら close_dialogs を呼ばない順序にすると正常時に事故らない。
※手元でこの1点を当てた検証スクリプトは editor 遷移＋タイトル欄取得まで100%成功。反映後 --draft 1本成功で無人5本公開を再開可能。

