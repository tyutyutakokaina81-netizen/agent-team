  ─────────────────────────────────────────────
  ★root cause（codeが publish_to_note.py を直すための要点）★
  ─────────────────────────────────────────────
  【事実】上記の通り、現行の TITLE_SELECTOR（textarea[placeholder*="タイトル"]）・
    本文 div[contenteditable="true"].first・公開 button:has-text("公開に進む") は
    いずれも新エディタの実DOMに一致している。＝セレクタ自体は概ね正しい。
  【考察】前回002報告の「6秒後も0ヒット」と実運用の不通は、セレクタ不一致ではなく待機/遷移の問題：
    (1) L298 page.goto(entry) 後の wait_for_load_state("networkidle", 20s) が
        新SPAエディタ（ProseMirror＋AIアシスタント＋autosaveで通信が途切れない）では
        networkidle に到達せずタイムアウト→except→continue で "その入口を捨てる"。
        全入口がこれで落ちると title_input=None のまま L318 の旧URLフォールバックに落ち、そこも同様。
    (2) editor.note.com/new は即 /notes/<id>/edit/ にリダイレクトするため、
        リダイレクト完了→ProseMirrorマウントまで数秒かかる。6秒待機は短いことがある（実測は8秒で安定）。
  【提案・具体修正】
    - L298/L316 の wait_for_load_state("networkidle", …) を
        wait_until="domcontentloaded" + page.wait_for_selector('textarea[placeholder*="タイトル"], div[contenteditable="true"]', timeout=15000)
      に置換（networkidle依存を廃止）。
    - タイトル待機タイムアウトを 8s→15s に。EDITOR_ENTRIES は editor.note.com/new を先頭で維持でOK。
    - 画像挿入は input[type=file] 直掴みをやめ、先に button[aria-label="画像を追加"] をクリックしてから
      file input を待つ実装へ（初期0件のため）。見出し画像UIは新エディタでは別導線なので要確認。
    - 上記なら無人 --draft / 公開 とも通るはず（実測でセレクタ一致は確認済み）。

