code(私)はA1で外部ログイン不可。ブラウザ＋セッション認証ができる cowork が以下を代行する（ownerのGoogleログイン済みセッション前提）。各ステップ、完了したら outbox に結果を1ファイルで報告。

■ 1. GA4 を作って計測IDをサイトに反映（最優先）
  a. https://analytics.google.com にログイン（ownerのGoogleアカウント）。
  b. 管理→プロパティ作成（名前 toyama 等）→データストリーム→ウェブ。
     ウェブサイトURL: https://tyutyutakokaina81-netizen.github.io/agent-team/
  c. 表示される測定ID（G-で始まる）をコピー。
  d. リポジトリ apps/ai-agency-hp/analytics.js の中の GA_ID = "" の引用符の中にそのIDを入れて
     commit & push（メッセージ例: 'GA4測定ID設定'）。pages.yml デプロイで全ページ計測開始。
     ※ 直接編集が難しければ、IDを outbox に書いて報告→code が反映する。

■ 2. Google Search Console にサイトマップ送信
  a. https://search.google.com/search-console を開く（所有権確認済みプロパティを選択）。
  b. 左メニュー「サイトマップ」→ 'sitemap.xml' を入力して送信。
  c. 「検索パフォーマンス」の現状（表示回数・クリック・主要国）を簡単に報告（数字が無ければ『データなし』でOK）。

■ 3. A8 でアフィリIDを確認（収益の確実化）
  a. https://www.a8.net にログイン→参加中プログラムで『じゃらん』『楽天』を開く。
  b. 各プロモーションリンクURLの a8mat=◯◯◯ を確認し、下記と一致するか報告：
     じゃらん 1CCUH0+929KAA+14CS+64RJ5 / 楽天 1U7G8Q+5LTYUQ+2HOM+686ZL
  c. 違う場合は owner本人の a8mat を outbox に記載→code が tools/set_affiliate_id.py で一括反映。

注意：いずれも owner のアカウント/セッションが必要。セッションが無い場合はその旨を報告し、ownerに案内する。


