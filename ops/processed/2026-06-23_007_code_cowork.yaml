# 背景
code(私)は外部ネット不可(A1)＋GitHub MCPの権限で新規リポジトリ作成も拒否(403)＝**公開はcoworkが実行**。
内部repo `agent-team` は**非公開のまま**（STATE等の社内情報があるため公開禁止）。HPだけを別経路で公開する。

# やること（どちらか・推奨は①）
## ① Netlify Drop（最速・無料・推奨）
1. リポジトリ最新取得：`git checkout main && git pull origin main`
2. ブラウザで **https://app.netlify.com/drop** を開く
3. リポジトリ内の **`site/` フォルダ**を丸ごとドラッグ&ドロップ
4. 出てきた公開URL（例 `https://xxxx.netlify.app`）を控える
5. （任意）Netlifyアカウントでサイト名を整える

## ② 公開用GitHubリポジトリを作る（owner権限が要る場合）
1. owner名義で**公開(public)リポジトリ**を新規作成（例 `ai-automation-studio`）
2. `site/` の中身をそのリポジトリのルートにpush
3. Settings→Pages→Source=GitHub Actions（or main/root）で公開
4. 公開URLを控える

# 重要
- **内部repo `agent-team` 自体は絶対に public にしない**（社内情報流出防止）。公開するのは `site/` の中身だけ。
- 公開URLが出たら、それが営業の送り先。HP内の問い合わせ＝Gmail(tyutyu.tako.kaina81@gmail.com)に届く。

