title: 【遡及】公開済み10本に見出し画像(サムネ)をフリー画像で後付け
---

公開済み記事10本はサムネがnote既定（タイトル文字）のまま。海外クリック入口を強化するため、
note編集画面で各記事を開き「見出し画像」を後付けする。
★サムネのソース＝フリー画像で統一（オーナー指示）。
　- 第一候補＝note『みんなのフォトギャラリー』（無料・商用可）
　- 足りなければ外部フリー素材（Unsplash / Pexels / Pixabay 等＝商用利用可・帰属表記の要否を確認）
　- いずれも写真風で統一（イラスト/テキストデザイン/図表はNG）

【食・文化 5本：下記キーワードでフリー画像検索→1枚設定】
1. 2026-05-31 白えび丼            → 検索: 富山湾 / 海老 / shrimp / 寿司
2. 2026-06-01 富山ブラックラーメン → 検索: ラーメン / ramen / 醤油ラーメン
3. 2026-06-06 氷見うどん          → 検索: うどん / udon / 麺
4. 2026-06-07 高岡大仏            → 検索: 大仏 / 仏像 / Buddha statue
5. 2026-06-11 氷見牛              → 検索: 和牛 / wagyu / 牛肉 / steak

【ドラえもん 5本：キャラ画像は使わない（著作権）。キャラ無しのフリー画像でOK】
※ドラえもん等キャラのAI生成・キャラ写真は禁止。下記の"場所/物"のフリー画像でよい。
　オーナー撮影の実物の像/トラム写真があればそれを優先（任意）。
6. 2026-06-20 本物のドラえもんの故郷  → フリー画像: 高岡 / 富山 / Japan park（任意で実物の像写真）
7. 2026-06-21 ドラえもんトラム        → フリー画像: 路面電車 / tram / Japan streetcar（任意で実車写真）
8. 2026-06-22 ドラえもんと五箇山      → フリー画像: 五箇山 / Gokayama / 合掌造り / gassho village
9. 2026-06-23 ドラえもんで育った君へ  → フリー画像: 公園 / Japan park / 木立（任意で像を撮る人の後ろ姿・PIIなし）
10. 2026-06-24 藤子F不二雄ギャラリー  → フリー画像: 美術館 / museum / 高岡（建物外観でOK）

【注意】
- PII（地区名・人物特定）が写る画像は避ける。ライセンスは商用可のものに限る。
- 設定できない記事は既定サムネのまま残し、どれが未設定かを報告。

【報告】各記事の設定可否（OK/未設定）・使ったフリー素材の出所（noteギャラリー or 外部サイト名）を ops/outbox に1件で。
