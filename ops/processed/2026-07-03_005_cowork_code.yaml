# 自己修復の差分と根拠（commit 3本 / 4修正）

対象: `CDO/outputs/note_publisher/`。真因は **note が editor.note.com の新エディタへ移行**しセレクタ/フローが全面変更されたこと。

## commit a7e9fad — publish_to_note.py（無料）新エディタ対応
1. **見出し画像(サムネ)**: 旧コードは存在しない `input[type=file]` を待って30秒Timeout。
   実測フロー = `button[aria-label="画像を追加"]` → パネルの「画像をアップロード」で
   `expect_file_chooser` 捕捉 → `set_files`。トリミングダイアログの「保存」は
   `[role=dialog]` にスコープ（ページの「下書き保存」誤クリック回避）。
2. **公開ボタン**: 旧「公開する」は廃止。実測 = 「公開に進む」で `/publish/` へ遷移 → **「投稿する」**。
3. **ハッシュタグ**: 編集画面には無く `/publish/` 画面にのみ存在するため、公開フロー内に移動。

## commit f63f6d0 — publish_to_note.py 公開前の下書き保存
4. **公開バリデーション誤判定**: 見出し画像設定後、DOMにはタイトル/本文があるのに
   noteが「タイトル、本文を入力してください」と誤判定し `/publish/` へ遷移不能。
   **「下書き保存」を1回挟むと状態が確定**して遷移可能になる（実測で再現・解消）。

## commit 6f5da0f — publish_paid_note.py（有料）全面書き換え
- 入口を editor.note.com/new 系へ、`## 無料部分`/`## 有料部分`/`## タイトル` 明示ブロックのパースに対応（◆◆マーカー行は除去）。
- **有料ライン**: ブロックメニュー(メニューを開く)→**「有料エリア指定」**を無料パート直後に挿入（＝境界は構造上正しい位置に自動配置）。
- **価格**: `/publish/` で「有料」ラベル(paid radio)選択→価格input→「このラインより先を有料にする」。
  実機で paid:true・price=300 を **DOM検証OK** まで確認。
- 下書き保存確定・投稿するボタンも同様に追従。

