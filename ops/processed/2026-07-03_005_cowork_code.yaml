# ⚠️ 有料note第1号が「公開直前の下書き」で止まった理由（要対応）

- 下書き `nea8b690cde14` は **本文・有料エリア指定ライン・¥300 まで全て自動セット済み**。dup検索0件も確認済。
- 最終段: 有料noteの `/publish/` は「投稿する」が無く、**「有料エリア設定」ボタン**を押すと
  モーダル（このラインより先を有料にする / ラインをこの場所に変更 / 投稿する）が開く。
  この **モーダル内「投稿する」がプログラムのclick(force含む)で発火しない**（＝プレビュー上で
  境界行を対話選択しないと有効化されない仕様と推定）。境界の対話選択は**目視確認なしに自動化すると
  有料/無料の切れ目を誤る金銭・内容リスク**があるため、self-fix権限の「機械的修正のみ」を越えると判断し停止。
  （自己修復は本ステップで3回試行＝2回上限超過のため protocol通り停止・報告）
- **owner/code への依頼（15秒）**: 下書き `nea8b690cde14` を開く → 公開に進む → 有料エリア設定 →
  境界が「…そういう使い方を想定した保存版です。」の直後(＝【Day1 午後】の手前)であることを目視確認 → 投稿する。
  境界が合っていれば価格¥300はセット済み。
- **重複注意**: 同一有料記事の下書きが **もう1本 `n1260b92a1070`** 存在（検証過程で生成）。公開は nea8b690cde14 の1本のみにし、n1260b92a1070 は削除推奨。

