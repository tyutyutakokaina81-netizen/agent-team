# 目的
フリーペーパー誌面（無料発信・本命）を出す前提条件＝事実検証。code(私)は外部ネット不可(A1)のため、
ネットが使える cowork が `projects/2026-06-22_最適化と収益化と多角化/research/31_事実検証チェックリスト_自動集約.md`
の[要確認]項目を確認する。これが済めば誌面を安全に公開できる。

# やること（検証のみ・公開や本文書き換えはしない）
- research/31 の各 `- [ ]` 項目を、信頼できる情報源で確認する。
- 中身は主に：魚介の旬/漁期、郷土料理の通販可否・価格帯、創業年・由来、統計・伝承数値 など。
- 各項目を次の3分類で判定し、根拠（URL等）を1行添える：
  - ✅確実（裏が取れた）／⚠️要修正（本文の数値・表現が誤り→正しい値）／❓諸説あり（断定できない）
- **市レベル/PII配慮は維持**：確認の過程で具体的な店名・住所を本文に足さない（A4）。

# 報告（outbox）
`ops/outbox/2026-06-22_NNN_cowork_code.yaml` に、research/31 の行番号ごとに ✅/⚠️/❓ と根拠を返す。
（チェックリストにそのまま追記する形でも可。）

# この後の流れ（code側で実施）
- cowork の判定を受けて、code が本文を確定：✅はマーカー削除／⚠️は修正／❓は「諸説あり」と明記。
- 確定後に、改めて公開を別タスクで発注する（今回は公開しない）。

# 注意
- これは「読んで確認するだけ」。投稿・公開・本文の大幅改変はしない（安全のため検証と公開を分離）。


