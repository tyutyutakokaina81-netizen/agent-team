# サンプルタスク

これは `ops/inbox/` のフォーマット確認用サンプルです。
実運用では削除して問題ありません。

## ファイル構造の説明

- frontmatter（`---` で挟まれた部分）= 機械が読むメタ情報
- 本文（frontmatter 以下）= 受け手のエージェントが読む依頼詳細

## 試運転

このファイルを使って `process_inbox.py` の各サブコマンドを試せます：

```bash
python3 ops/process_inbox.py list
python3 ops/process_inbox.py show sample-task
python3 ops/process_inbox.py take sample-task
python3 ops/process_inbox.py done sample-task --result "サンプル動作確認OK"
```

`done` するとこのファイルは `ops/processed/` に移動します。


