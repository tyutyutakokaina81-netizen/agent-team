# 背景
2026-06-12 のインシデント（重複・テスト・未来日付記事の大量公開）以降、note への自動公開は
**棚卸しが完了するまで停止中**。収益化を始めるには、まずこの棚卸しを終えて再開条件①を満たす必要がある。

# 依頼（cowork が note 側で実行）
**新規公開・編集は一切しない。** 以下の「現状把握」だけを行い、結果を `ops/outbox/` に報告する。

1. 現在 note に**公開中**の記事一覧を取得する（タイトル / URL(note ID) / 公開日 だけでよい）。
2. 次の3カテゴリに該当する記事を洗い出す：
   - **重複**（同一テーマ・同一タイトルが複数）
   - **テスト記事**（本文がダミー/テスト目的のもの）
   - **未来日付**（本日 2026-06-22 より先の日付で公開されているもの）
3. それぞれの**件数**と、該当記事の**タイトル/URLの一覧**を報告する。
4. 非公開化・削除は**まだしない**（次の指示で、対象を確定してから行う）。

# 制約
- A1: これは cowork 側（ネット可・ログイン済み環境）でのみ実行可能。code は到達できない。
- A4: 報告に具体的な地区名・町名・住所を含めない（記事タイトルはそのままでよい）。
- 公開・本文編集・サムネ設定などの**書き込み系操作は禁止**（今回は読み取りと分類のみ）。

# 期待する報告（outbox）
