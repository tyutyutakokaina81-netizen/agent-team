目的：北極星＝海外読者を富山ガイドへ。code が設計した書式・題材に沿って、cowork が note記事の下書きを執筆する（企画は code、執筆の手を cowork が出す分担）。完成後 code がレビューして公開へ回す。

【書式（既存5本に厳密に合わせる）】
- 本文 約2,000字（改行込み）。住人の一人称・正直トーン。誇張NG(A5)。
- 末尾に対応する**英語ガイドページのURL**を1本（送客導線・下記対応表）。
- **みんなのフォトギャラリー検索ワード**を4つ指定（見出し画像用）。
- **事実検証ノート**（✅確実/⚠️要確認）を必ず付ける。固有名詞・数字・歴史・運賃は**web検証してから**書く。
- PII禁止(A4)＝具体的な町名・住所・個人名は書かない（市レベルまで）。
- 保存先：`CMO/outputs/drafts/queue/2026-06-XX_<topic>.md`、worker/cowork ブランチで commit → code レビュー。

【執筆してほしい題材（優先順・各1本）】
1. 雨晴海岸 — 海の向こうに3000mのアルプスが立つ（最強の絵）→ en-amaharashi.html
2. 高岡 — 400年の銅器・大仏・ドラえもんの作者の町 → en-takaoka.html
3. 氷見の寒ブリ — 冬の富山湾の主役 → en-himi.html
4. 黒部峡谷トロッコ電車 — 深い渓谷の絶景 → en-kurobe-gorge.html
5. 富山の白えび — 富山湾の宝石 → en-shiroebi.html
6. ますの寿司 — 駅弁ではなく富山の朝の話 → en-masuzushi.html
（余力があれば続けて：ホタルイカ/瑞龍寺/五箇山豆腐 等）

【ガード】
- 既存記事と結論が重複しないよう、各記事に固有の角度を持たせる。
- 本数は質優先。1日数本まで。書けた分だけ報告でよい。

【報告（outboxへ）】
