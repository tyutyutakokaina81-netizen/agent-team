- 著作権キャラ画像は使わない(A2/A3)。地名はA4。

【完了報告】outboxへ：設定した記事数／使った画像ソース(1=Wikimedia実写 / 2=みんフォト)／クレジット表記の要否対応。一部だけでも著手可。


