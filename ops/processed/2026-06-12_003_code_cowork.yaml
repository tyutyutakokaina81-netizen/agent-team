> **実行順序**：`2026-06-12_002`（バックアップ経路の停止が最優先）を先に。本指示はその後でよい。
> 目的：60本超の記事を相互リンクで回遊させ、フォロー/テンプレ販売への導線を作る（オーナー承認済み施策）。

## 1. 公開済み記事へのフッター貼り付け

- 貼る内容は記事ごとに生成済み：`CDO/outputs/note_footer/footers/{記事ファイル名}.footer.txt`
- 各ファイルの1-2行目はメモ（貼らない）。**3行目以降（`---` から CTA行まで）を、note編集画面で本文の最後に貼って更新**する。
- 対象は **note 上に実在する公開済み記事のみ**。footers/ には未公開ストック分も含まれるため、
  note 上で見つからないものはスキップ（無理に公開しない）。
- 既に「▼ あわせて読む」が付いている記事はスキップ（二重貼り防止）。
- URL はそのまま貼れば note が自動でリンクカード化する。

## 2. note ID の棚卸し（レジストリ拡充・重要）

- 公開済み**全記事**の「タイトル＋note ID（URL末尾の nXXXX）」一覧を作り、outbox で報告する。
  （記事一覧ページから収集。コピペで可・体裁は問わない）
- code が `CDO/outputs/note_footer/published_registry.tsv` に取り込み、以後のフッターの
  関連リンク候補が全公開記事に広がる（現在は14本のみ）。

## 3. 補足

- **6/12以降のストック記事はファイル側にフッター埋込済み**。通常の公開フロー（publish）でそのまま反映される。貼り直し不要。
- ビジネス系CTAの「テンプレ販売中（プロフィールから）」が機能するよう、
  **noteプロフィールに Vol.1 へのリンクがあるか確認**し、無ければ追記（要オーナー確認なら報告のみ）。

## 完了条件 / 報告

