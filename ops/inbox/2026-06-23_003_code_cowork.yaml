各冊の入稿手順：
1. KDP →「+ Kindle本を作成」。
2. **タイトル/サブタイトル/紹介文/キーワード7/カテゴリ2/価格** を listing ファイルからコピペ。
3. **著者名 = `Kai Arata`**（`著者プロフィール_Kai_Arata.md` 参照。本名はAmazon管理タブのみ＝非公開）。
4. 原稿＝対応する **.epub をアップロード**。表紙は listing の「表紙指示書」でオーナー/coworkが用意（無料素材/無料画像生成）。
5. **AIコンテンツ設問＝「AI-generated」を開示**（`出版ガード_著作権_AI開示_商標.md` ①）。
6. ブランド名に触れる本は商品説明に**商標・非提携の一文**を入れる（ガード ②）。
7. 出版 → 24〜72hで配信。

> 出す順番は `ローンチ/CAO_ディスカバリー最適化.md` の優先順位に従う（最初の2冊を先行）。

