> 背景：CAO分析（`CAO/outputs/2026-06-19_note閲覧数減少の原因分析.md`）の通り、
> 閲覧数減少の主因は「6/12に公開81本が消えた（面の喪失）」＋「6/13以降 新規公開ゼロ（初速の喪失）」。
> 質ではなく公開運用の問題。本指示で **公開面を戻し、日次フローを安全に再開** する。
> publish_to_note.py は本日強化済み（未来日付ガード＋二重公開防止）。再開しても事故は起きにくい。

## 0. 安全確認（再開の前提・最優先）

再開条件3点の達成を確認・報告すること：
1. note側に **重複/テスト/未来日付の公開記事が残っていないか** 最終確認（残っていれば非公開化）
2. 公開スクリプトの **未来日付ガード＋冪等化** は code 側で実装済み（`publish_to_note.py`）。動作確認だけ行う：
   - `python3 publish_to_note.py --by-date 2099-01-01 --text-only` → **公開対象なしで安全に停止**すればOK（実際には公開しない）
3. **台帳とnoteの再同期**：下の「2. PV棚卸し」で取得する一覧をもって突合

## 1. 公開面の復旧（誤って非公開化した正規記事を戻す）

- 6/12に非公開化した69本のうち、**正規の良質記事が巻き込まれていないか**を確認。
- 巻き込まれている正規記事は **再公開**（重複・テスト・未来日付だったものは戻さない）。
- 判断に迷う記事は再公開せず、タイトル一覧を outbox に出して code/CAO の判断を仰ぐ。

## 2. PV棚卸し（CAO分析の数値確定・回復計測の起点）

- note ダッシュボードから以下を取得し outbox に貼る（体裁は問わない・コピペ可）：
  - **日別総PV**（直近30日 = 5/20〜6/19）
  - **公開記事数の推移**（6/12前後の減少幅）
  - **記事別PVトップ10**（どの型が生き残っているか）
  - **流入経路**（検索／おすすめ／X／その他）
- code が `CAO/research/` に書き戻し、`2026-06-19_note閲覧数減少の原因分析.md` の「検証手順」と突合する。

## 3. サムネ後付け（クリック率の底上げ）

- サムネ未設定の公開済み記事（少なくとも6/10公開の5本：いとこ煮/べっこう/新湊内川/金屋町/梅雨の高岡）に
  **文字なし写真1枚**を設定。生成済みサムネがあれば `CDO/outputs/note_publisher/thumbnails/` を使用。

## 4. 日次公開の再開（フローの回復）

- 安全確認(0)が済み次第、**日次5本（食2本）公開を再開**。
- 公開時刻は **朝7〜9時** に寄せる（深夜公開を避ける／初速ウィンドウを取る）。
- コマンド例（写真なし・本日分）：`python3 publish_to_note.py --by-date 2026-06-19 --text-only`
  - 既に公開済みの記事は冪等化で自動スキップ（再公開は `--force` 明示時のみ）。

## 5. Xクロスポスト再開（外部流入の回復）

- 生成済み素材（本文1段落引用＋「続きはnoteに」）を毎公開で投下。素材が無い分は code に生成依頼。

## 完了条件 / 報告（`ops/outbox/2026-06-19_001_cowork_code.yaml`）

1. 再開条件3点の達成状況（特に未来日付ガードの動作確認結果）
2. 再公開した正規記事の本数＋タイトル（判断保留分があれば一覧）
3. PV棚卸しデータ（2項の4種）
4. サムネ設定した記事数
5. 日次公開を再開できたか（できない場合は理由）
6. 詰まり・要オーナー判断事項

## 注意

- 無料のみ／破壊的操作（削除・上書き・reset）禁止。
- 正規記事か重複/テストか迷うものは **戻さず報告**（誤再公開より取りこぼしを優先）。
