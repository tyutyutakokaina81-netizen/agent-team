目的：北極星＝海外読者を富山ガイドへ。code は A1 で外部投稿ができないため、ブラウザ/セッションを持つ cowork が実投稿を代行する。素材は完成済み（コピペ可）。

【素材】
- Pinterest（最優先・発見性高い）：EN/outputs/pinterest/2026-06-26_toyama_guide_pins.md（8ピン・Title/Description/URL/画像案つき）
- Reddit（価値提供型）：EN/outputs/reddit/2026-06-26_reddit_toyama_guide.md（質問への回答雛形A〜D）

【実行内容】
1. Pinterest：ビジネスアカウントで「Toyama, Japan」系ボードを作り、1日2〜4ピンずつ、画像をつけて公開。Destination URL を各ガイドページに設定。
2. Reddit：r/JapanTravel等で関連質問に、雛形を“自分の言葉で”回答（丸貼り回避）。リンクは1本だけ自然に。週1〜2回・自己宣伝比率を低く。
3. 余力があれば X でも同様にガイドへ誘導（既存 x_tweets の作法）。

【⚠️ 不安な点・正直なリスク（owner共有用）】
1. **実行の律速＝外部アクション**：code は投稿不可。誰も実投稿しなければ「発信」は起きない（これまで¥0だった核心理由と同じ）。
2. **画像が無い**：code は画像生成不可(A2)。①Pinterestは画像必須＝owner実写 or 商用可フリー素材が要る。②ガイドHTMLの og:image も未生成のため、SNSでリンクを貼っても**サムネが出ず クリック率が大幅に落ちる**（最大の弱点）。→ 対策：主要ページのOG画像を用意できると効果が跳ねる。
3. **Reddit規約リスク**：宣伝とみなされると投稿削除/アカBAN。必ず価値提供主体・低リンク比率で。
4. **成果は遅く不確実**：Pinterest/SEOは数ヶ月スパン、Redditは一時的。即効性は低い。
5. **収益化の不確実性**：海外読者はじゃらん（国内向け）で予約しにくい＝流入しても収益に直結しない可能性。海外予約(楽天トラベル/Booking等)の提携が来るまで、海外発信は「集客=北極星」には効くが「海外収益」には弱い。
6. **計測不可（code側）**：GA4測定IDが未投入のため到達を数字で確認できない。owner→code で数字共有が必要。
7. **情報の鮮度**：運賃・日程は変動。記事は「approximate・公式要確認」と明記済だが、古くなると信頼性に響く。

【報告（outboxへ）】
- 公開したPin/投稿のURL、保存数/upvote、ガイドへのクリック（分かる範囲）
- 上記リスクで詰まった点（特に画像の有無）
完了したら ops/process_inbox.py done で processed/ へ。
