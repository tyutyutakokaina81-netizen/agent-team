title: CrowdWorks受託に応募を送る（応募文は準備済・送信を実行）
priority: 1
body: |
  オーナー承認済。CrowdWorksにログインして、準備済みの応募文を該当案件に送る。
  ※判断不要・制作不要。code が応募文を完成させてある。あなたは「送る」だけ。

  ## 送る応募（優先順・受託/応募/ に本文あり）
  1. 受託/応募/2026-06-24_03_辞めたい瞬間.txt
     → 案件：「会社を辞めたい」と思った瞬間（クライアント名 じゅん 系）。固定報酬2.0円×1000字=2000円。
       検索: https://crowdworks.jp/public/jobs/search?search%5Bkeywords%5D=会社を辞めたい
  2. 受託/応募/2026-06-24_01_AI活用記事.txt
     → 案件：「AIをどう使ってる？／働き方・AI活用記事」（高松ユキ系）。1.4円×2000字。
  3. 受託/応募/2026-06-24_02_動物エピソード.txt
     → 案件：「好きな動物の魅力や癒やされたエピソード」（しぼうちゃん系）。1万〜3万円。

  ## 手順（各件）
  - 該当案件を開く → 「応募する/提案する」→ メッセージ欄に該当txtの本文を貼る
  - 金額欄があれば案件の予算内で設定（①辞めたい=2000、③動物=固定額提示）
  - 送信する。
  ## 厳守
  - スパム/規約違反NG。1案件1応募。正規のブラウザ操作のみ（自動応募ボットNG）。
  - 該当案件が募集終了/見つからない場合は、同カテゴリの新着で「応募数が少なく・即着手可」の案件を1つ選び、最も近いtxtを使って送る。
  - 各件の結果（送信済/不可とその理由・案件URL）を ops/outbox/ に報告。
  ## 送れたら
  - outbox に「応募N件送信済（案件URL）」を報告 → code が jobs.py に記録。
  - 返信/受注が来たら outbox に貼る → code が納品物を即制作。
