## 0-b. 今後のルール：code 不在時に cowork へ直接指示する場合（フォールバック）

1. 作業前に必ず `git pull`（最新化せずに commit しない）。
2. commit は **自分が触ったファイルだけ** `git add <個別パス>`（`git add -A` 禁止）。
3. やったこと（公開URL・変更ファイル）を `ops/outbox/` に1枚残す → 復帰後に code が台帳と STATE に同期する。
4. 削除・rename・reset 等の破壊的操作はオーナー明示承認なしにやらない。

