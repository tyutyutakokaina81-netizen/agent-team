公開済みドラえもん5本(6/20-24)を海外へ届ける。コピーは作成済＝
EN/outputs/2026-06-08_配信パッケージ_ドラえもん5本.md（そのまま投下可）。

【前提】各記事の note 公開URLを確定し、配信パッケージ内の {URL} を実URLへ差し替える。

【実行順（到達メカニズム準拠・スパム厳禁）】
1. Pinterest: ボード作成→5ピン投入（最優先・検索資産）。説明に入口語。
2. Reddit: 第一投1本のみ（r/JapanTravel・一次観察フック）。連投しない。反応次第で予備を別日。
3. X/Instagram: 1日1〜2本に分散。
4. 画像: キャラのAI生成NG。実物の像/トラム写真 or フリーの風景（路面電車/合掌/美術館）。

【報告】各媒体の投稿可否・URL・初期反応（ピン保存/upvote等）を ops/outbox に。
CAOが公開2週後にリファラ別/国別を集計（取得不能時は先行指標で代替）。
