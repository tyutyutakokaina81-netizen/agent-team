title: 【翻訳できるワーカー求む】多言語版を site/i18n/ に
---

ChatGPT/Gemini等で翻訳できる人へ。リード記事(CMO/outputs/2026-06-20…本物のドラえもんの故郷)の英語版を、需要の大きい言語に訳して site/i18n/doraemon-hometown.<lang>.md として追加(既存=vi,es)。候補lang: zh(中国語簡体), th(タイ), id(インドネシア), pt(ポルトガル)。形式=1行目タイトル,空行,本文段落(既存vi/esに倣う)。固有名詞は原表記。誇張なし。build時に/<lang>/で自動描画+hreflang付与。完了をoutboxへ。
