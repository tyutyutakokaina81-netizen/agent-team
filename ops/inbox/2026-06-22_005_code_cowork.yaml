# 目的
オーナー指示「写真はcoworkに作らせて」。code は画像生成不可(A2)・外部取得不可(A1)のため、
ネット/画像AIが使える cowork が写真を用意する。仕様＝`projects/2026-06-22_最適化と収益化と多角化/research/32_写真プラン_食特集.md`。

# やること
- research/32 の [写真1]〜[写真13] ＋表紙の各項目について、**写真風の画像**を用意する。
  - 方法：(a) 画像AI（research/32 の英語生成プロンプトを使用）／(b) 商用利用可の無料素材（Pexels等）。
  - A3：形式は全部「写真風（実写 or 写真リアル）」。イラスト・図解・文字入りデザインは不可。
- 保存先：`thumbnails/freepaper/issue01_food/` に `01_白えび.jpg` のように写真番号で保存（無ければフォルダ作成）。

# 厳守（A4 / 権利）
- 店の看板・住所・人物の顔・ナンバープレート・著作権キャラ/商品ロゴは**写さない／生成しない**。
- 商用利用可の素材・自前生成のみ（出所が不明な拾い画像は使わない）。
- 写真の差し替えが要る誇張演出はしない（実物に即した自然な画）。

