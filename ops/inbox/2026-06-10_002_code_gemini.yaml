## やること
下の各プロンプトを Gemini（Imagen）に1本ずつ貼って **写真風の画像**を生成し、**指定ファイル名で保存**してください。

## ルール（厳守）
- 写真風（フォトリアル）のみ。**文字・イラスト・図表・ロゴNG**。
- 商用利用OKの生成物のみ使用（Geminiの利用規約に従う）。
- **著作権キャラは生成しない**（ドラえもん等）。**万葉線の記事はAI生成せず実写写真を使う**（下記でスキップ指定）。
- 縦横比 16:9。実在スポットの捏造はしない（雰囲気で可）。

## 保存先（重要）
生成画像は `CDO/outputs/note_publisher/thumbnails/` に **下記のファイル名（記事stem.jpg）** で保存。
→ その後 Mac で `python3 attach_thumbnails.py --filter 2026-06-10` を実行すると公開済み記事へ自動添付されます。
（Gemini CLIでrepoに書ける場合は worker/gemini ブランチへ push。web版なら画像を保存してオーナーが配置）

