# 目的
オーナー指示「公開してくれ」に対する、収益化の初回放出。
有料マガジン導線（GTM計画 research/12）の**無料看板2本**を公開し、ファネルの入口を開ける。
6/12インシデント再発防止のため、**少数・名指し・自己ガード付き**で行う。

# 公開対象（この2本だけ・他は公開しない）
1. `CMO/outputs/2026-05-31_note記事_白えび丼_富山湾の宝石.md`
2. `CMO/outputs/2026-06-13_note記事_鱒寿司は富山の朝食.md`

# 必須ガード（1つでも該当したらその記事はスキップして報告）
- **既公開チェック**：`CDO/outputs/note_publisher/.published.log` および note 上で、
  同タイトルが**既に公開済みなら公開しない**（重複防止）。
- **未来日付・テスト記事は対象外**（今回は名指しの2本のみ。それ以外は一切触らない）。
- 公開は **text-only**（サムネは後付け。実写写真があるならオーナー判断で添付可）。
- 1回の実行で**この2本を超えない**（並列実行・連投しない）。

# 実行（オーナーMacでも可）
```
python3 publish_to_note.py --article CMO/outputs/2026-05-31_note記事_白えび丼_富山湾の宝石.md --text-only
python3 publish_to_note.py --article CMO/outputs/2026-06-13_note記事_鱒寿司は富山の朝食.md --text-only
```

# 報告（outbox）
`ops/outbox/2026-06-22_NNN_cowork_code.yaml` に：
- 各記事の結果（公開/スキップ理由）、公開できた場合は note ID・URL
- 既公開だった場合はその旨（→ code が台帳と突き合わせる）
- 異常があれば内容

# 次段
この2本がクリーンに公開できたら、棚卸し（2026-06-22_001）の結果と合わせて
「1日5本ルールでの本格再開」と「有料マガジンの編成・出品」へ進む。
