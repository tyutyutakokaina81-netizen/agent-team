> これは「いつものルーティン」の実行指示です。code（私）は記事制作・X投稿文生成・台帳/STATE整備・push まで完了済み。**note公開・サムネ挿入・X投稿の“実行”は cowork（Mac側）でお願いします**（code環境は外部遮断で実行不可）。

## 対象
`CMO/_index.md` で **ステータス＝「完了（公開待ち）」** の note 記事すべて。
- 直近の新規：**6/10〜6/12 の制作分（フリーランス実務シリーズ Vol.2〜14 ＋ 富山食/文化/観光）**。
- 未公開のまま残っている **6/9 の25本**（下書きにある想定）。

## 手順（Mac・無料のみ・コストゼロ厳守）
1. **最新を取り込む**（git競合時はSTATE「サムネ欠落の原因と対処」の手順／`git reset --hard origin/main` 退避ブランチ付き）。
2. **サムネを用意**（無料）。次のどちらかで写真風・著作権キャラ無し：
   - note編集画面の **みんなのフォトギャラリー**（無料）から記事に合う写真を選ぶ、または
   - `CDO/outputs/2026-06-10_サムネ生成プロンプト_全記事マスター.md` のプロンプトを Bing Image Creator 等に貼って生成→`note_publisher/thumbnails/{記事stem}.jpg` に保存。
3. **note に公開（サムネ付き）**。`note_publisher/publish_all.sh --date YYYY-MM-DD` を使うと、`thumbnails/{stem}.jpg` があれば公開時に自動で見出し画像に設定。
   - **note 1日上限=25本厳守**。多い日は複数日に分割。
4. **X へクロスポスト**。各記事のツイート文は **`EN/outputs/x_tweets/` に生成済み**（単発280字＋スレッド）。英語アカウントで投稿。タグ例 #Toyama #Takaoka #Japan #freelance #buildinpublic（誇張なし）。
5. **完了報告**：`ops/outbox/2026-06-12_xxx_cowork_code.yaml` に「公開した記事と note URL・サムネ有無・Xポストの有無/URL」を返す。台帳の「公開済」反映は code が行う。

## 注意
- コストをかけない（無料ツールのみ・有料画像APIは使わない）。
- 二重投稿に注意（既に公開済みの記事は対象外。`.published.log` で管理）。
- 削除・上書き等の破壊的操作はしない。
