## 公開手順（オーナーのMacで）

```bash
# 0) 前提：note側の棚卸し（再開条件①③）が完了していること
#    まだなら本番公開せず、まず ops/inbox/2026-06-19_001 を先に処理する

# 1) 本番公開ゲートを開ける（棚卸し完了後のみ）
touch ops/PUBLISH_ENABLED

# 2) キューを公開（launchd待ちなら即時実行）
bash ops/cowork_run.sh
#    or 1本ずつ： python3 CDO/outputs/note_publisher/publish_to_note.py \
#                  --article drafts/queue/<ファイル名> --text-only
```

- ゲート未設定（PUBLISH_ENABLED 無し）の場合、cowork_run.sh は **--draft（下書き保存のみ）** で動作し本番公開しない＝動作確認に使える。
- 公開できた記事は自動で drafts/published/ へ移動し、outbox に結果報告＋push される。
- 冪等化により二重公開はブロック。再公開時のみ --force。

