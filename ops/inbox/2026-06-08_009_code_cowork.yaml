title: 【遡及】公開済み10本に見出し画像(サムネ)を後付け
---

公開済み記事10本はサムネがnote既定（タイトル文字）のまま。海外クリック入口を強化するため、
note編集画面で各記事を開き「見出し画像」を後付けする（写真風で統一）。
方法＝原則『みんなのフォトギャラリー』で下記キーワード検索→写真風の1枚を設定。

【食・文化 5本：みんなのフォトギャラリーから設定】
1. 2026-05-31 白えび丼            → 検索: 富山湾 / 海老 / 寿司
2. 2026-06-01 富山ブラックラーメン → 検索: ラーメン / 醤油ラーメン
3. 2026-06-06 氷見うどん          → 検索: うどん / 麺
4. 2026-06-07 高岡大仏            → 検索: 大仏 / 仏像 / 高岡
5. 2026-06-11 氷見牛              → 検索: 和牛 / 牛肉 / ステーキ

【ドラえもん 5本：著作権上★AI生成NG・ギャラリーにキャラ画像は無い】
原則＝**オーナー撮影の実物の像/トラム/美術館の写真**を使う。無い分は実在の風景で代替し、要オーナー確認。
6. 2026-06-20 本物のドラえもんの故郷  → 第一:おとぎの森の5キャラ像(実写) / 代替:高岡の風景
7. 2026-06-21 ドラえもんトラム        → 第一:ピンクのどこでもドア型トラム(実写) / 代替:路面電車・富山
8. 2026-06-22 ドラえもんと五箇山      → ギャラリー可: 五箇山 / 合掌造り（キャラ不要の回）
9. 2026-06-23 ドラえもんで育った君へ  → 第一:像を撮る人の後ろ姿(実写・PIIなし) / 代替:おとぎの森 公園
10. 2026-06-24 藤子F不二雄ギャラリー  → ギャラリー可: 美術館 / 高岡（建物外観でOK・キャラ不要）

【注意】
- 写真風で統一（イラスト/テキストデザインNG）。PII(地区名・人物特定)が写る画像は避ける。
- ドラえもん等キャラのAI生成は禁止（実物の像/トラムの撮影写真のみ）。
- 設定できない記事は既定サムネのまま残し、どれが未設定かを下記outboxで報告。

【報告】各記事の設定可否（OK/代替/未設定）と、使った画像種別を ops/outbox に1件で。
