> 目的：同一タイトルが最大5本も重複公開され、PV・検索評価が分散している。
> 各タイトル1本だけ残し、**下記74本を「下書きに戻す／公開を停止」**（=復元可能・削除はしない）。
> これが閲覧数回復の最優先レバー。code(コンテナ)はnote到達不可のため自動化が空振り（74/74 manual）→ cowork(Chrome)に委譲。

## 手順（各記事）

1. `https://note.com/notes/<note_id>/edit` を開く（下の一覧の note_id を使う）。
2. 記事メニュー（「…」/設定）から **「公開を停止」または「下書きに戻す」** を実行（**削除しない**）。
3. 完了したら次へ。1記事1〜2クリック。

## 注意（重要）

- **削除ではなく下書き化**（復元可能に保つ）。
- 下記は各重複グループの「余剰分」。**各タイトルにつき公開版が1本は note に残る**ので消えすぎない。
- リスト元：`CDO/outputs/note_publisher/dedup_unpublish_list.tsv`（action=unpublish 行）。本ファイルにも全74件を転記。

