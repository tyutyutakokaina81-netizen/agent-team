## ⚠️ 正直なリスク（owner共有・過大約束しない）
- **即効性は低い**：Pinterest/SEOは数週〜数ヶ月、Redditは一時的。今日撒いて明日入金ではない。
- **画像が弱点**：code は A2 で画像生成不可。Pinterestは画像必須＋一部ページの og:image 次第でSNSサムネ/CTRが変わる。owner実写 or 商用可フリー素材があると跳ねる。
- **成果の確定はA8/GA側**：金額・クリックは owner 画面でしか見えない（code はA1で不可）。数字は owner→code 共有で。

## 報告（outboxへ・1ファイル）
①一致/不一致（不一致なら新ID） ②楽天トラベル/Booking等の取得リンク ③公開したPin/投稿URL・保存/upvote ④sitemap送信可否・表示崩れ有無・GA4測定ID。
