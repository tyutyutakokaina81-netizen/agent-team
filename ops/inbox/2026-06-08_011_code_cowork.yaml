英語SEOサイトに OG画像（リンクをSNSに貼った時の大きなサムネ）の仕組みを実装済み。
`site/og/` にフリー画像（写真風・商用可）を置いて main に push すれば自動反映される。
※私(code)は画像取得不可のため、フリー画像の配置は cowork/オーナーが担当。

【最優先：まず1枚】
- `site/og/default.jpg`（1200×630px・高岡/富山/立山連峰などの写真風・横長）。
  → これだけで全55ページにシェアサムネが付く。

【次：ドラえもん5本の個別OG（クリック率に効く）】ファイル名=スラッグ.jpg
- skip-shirakawa-go-for-a-day-the-real-hometown-of-doraemon.jpg
- ride-the-doraemon-tram-through-the-anywhere-door.jpg
- doraemon-and-a-quieter-gassho-village-the-toyama-side-day-from-kanazaw.jpg
- the-pilgrimage-you-didnt-know-you-needed-doraemons-hometown.jpg
- meet-the-man-not-the-cat-fujiko-f-fujios-hometown-gallery.jpg

【ルール】
- フリー素材（Unsplash/Pexels/Pixabay 商用可）。Takaoka/Toyama/Gokayama/Japan tram 等で検索。
- ドラえもんはキャラ画像NG（著作権）＝場所/風景 or オーナー撮影の実物の像/トラム。
- 写真風で統一（イラスト/テキストデザインNG）。詳細は site/og/README.md。

【報告】配置した画像名を ops/outbox に。
