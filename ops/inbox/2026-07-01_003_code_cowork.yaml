codeはnote/X/外部を見られない(A1)。coworkは見られる＆直せるので確認→未達なら修正→報告を1本で。git pull後に。各項目=①確認②できてなければ修正③報告。[1]baseline確認のみ:noteダッシュボードの月間PV/スキ/フォロワー数をoutboxに数字で。[2]note見出し画像:確認=設定済み本数の概数／修正=未設定記事にrepoのCDO/outputs/note_publisher/thumbnails/実写(104枚) or みんなのフォトギャラリー(検索ワードは各記事md末尾)でセット(最近/閲覧多い順)／報告=セット本数。[3]X配信:確認=今日投稿が出てるか／修正=無ければ CMO/outputs/2026-07-01_配信キット から1本投稿・可能なら毎日1本定期化／報告=有無と定期化可否・X権限無ければその旨。[4]タイトル反映:CMO/outputs/2026-06-29_note_タイトル最適化バッチ.md の★10本反映。制約=¥0(有料API/広告なし)・A4/A5・スパム/押し売りNG。報告=1つのoutboxに数字と○×+修正内容。着手できた分だけでOK。
