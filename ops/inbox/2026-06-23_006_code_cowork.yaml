# 目的
オーナー指示「coworkに増員」。作る側(code/agent)は過剰なほど足りている＝**律速は"外で動く手"**。
そこでcowork自身の実行キャパを最大化する＝**チャネルを直列でなく並列で同時に回す**。

# 増員＝並列化の具体（直列でなく同時に走らせる）
発注005/004/003を「順番に」でなく**4レーン同時並行**で回す：

| レーン | 担当作業 | 1日の目安 | 素材 |
|---|---|---|---|
| L1 B2B営業 | 見込み事業者へ提案＋お試しサンプル送付・返信対応・商談 | 接触 20〜40件/日 | `B2B英語発信代行_営業エンジン/`＋`300K設計/A` |
| L2 近場の現金 | クラウドソーシング/ココナラ出品・応募／報酬付きバウンティ探索応募 | 応募 5〜10件/日 | `受託_クラウドソーシング/` |
| L3 Vol.1送客 | X投稿1日1本・既存note記事へCTA | 1〜3アクション/日 | 発注004 |
| L4 入稿（条件付） | KDP登録が済めばKindle6冊＋Gumroad入稿 | 登録後に着手 | 発注003 |

## 並列の回し方
- 複数セッション/タブを使い、**L1〜L3は毎日同時に前進**させる（1レーンの待ちで他を止めない）。
- 各レーンに「次アクション期日」を持たせ、滞留ゼロを毎日潰す（営業管理トラッカー様式）。
- 受注/発注がどのレーンで出ても、即 `ops/outbox/` に書く → code が制作を即実行。

# 増員の正直な上限（守ること）
- **量より質**：スパム・規約違反・連投は逆効果（アカウント停止リスク）。1社1通・相手案件に触れる・押し売りしない。
- **アカウントのアクセス可否**：操作できないチャネルは止めて outbox に「○○アクセス不可・要オーナー設定」と報告。
- ゼロ予算（有料広告・有料ツール課金しない）。A4 PII禁止。A5 誇張・成果保証NG。

# 報告（outbox・毎日1回＋都度）
- レーン別：接触/応募/返信/商談/受注/入金 の数。
- 詰まり（アクセス不可・規約・反応薄）を具体で。→ code が素材改善や別チャネル提案で即対応。

# 増やせる方向（オーナーが許せば更にスケール）
- cowork セッションを複数並走できるなら、L1の接触件数を倍化。
- 対応言語・対象業種を分担して並列担当。

> 作る側は待機完了。**動かす数を増やすのがあなたの増員。** canonical(main)を壊さない。質を落とさない。
