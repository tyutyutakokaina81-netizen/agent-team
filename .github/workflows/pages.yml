name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Build site
        run: |
          mkdir -p _site
          # 正面＝AI自動化サポートのHP
          cp apps/ai-agency-hp/index.html _site/index.html
          # 既存ダッシュボードは /tavern.html で残す
          cp tavern.html _site/tavern.html
          # 無料Webツール（営業導線・集客）も公開
          for t in freelance-rate-calculator invoice-generator ai-prompt-builder; do
            if [ -f "apps/$t/index.html" ]; then
              mkdir -p "_site/$t"
              cp "apps/$t/index.html" "_site/$t/index.html"
            fi
          done
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
