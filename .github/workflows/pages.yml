name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Build site
        run: |
          mkdir -p _site
          # 正面＝AI自動化サポートのHP（日本語）
          cp apps/ai-agency-hp/index.html _site/index.html
          # 世界向け英語版
          cp apps/ai-agency-hp/en.html _site/en.html
          # 既存ダッシュボードは /tavern.html で残す
          cp tavern.html _site/tavern.html
          # 販売サイト（デジタル商品LP）＋商品サムネ画像
          cp apps/ai-agency-hp/store.html _site/store.html
          if [ -d apps/ai-agency-hp/img ]; then mkdir -p _site/img; cp apps/ai-agency-hp/img/* _site/img/ 2>/dev/null || true; fi
          # 複数HP展開①：富山・高岡ガイド（既存読者と客層が合う・アフィリ）。記事ページも全部配信
          if [ -d apps/toyama-guide ]; then
            mkdir -p _site/toyama
            cp apps/toyama-guide/*.html _site/toyama/ 2>/dev/null || true
            # OGサムネ画像・写真も配信（これが無いとog:imageが404になる）
            # 海外向け収益化スクリプト（国際アフィリ・冪等）
            [ -f apps/toyama-guide/affiliates.js ] && cp apps/toyama-guide/affiliates.js _site/toyama/affiliates.js
            if [ -d apps/toyama-guide/og ]; then mkdir -p _site/toyama/og; cp apps/toyama-guide/og/* _site/toyama/og/ 2>/dev/null || true; fi
            if [ -d apps/toyama-guide/photos ]; then mkdir -p _site/toyama/photos; cp apps/toyama-guide/photos/* _site/toyama/photos/ 2>/dev/null || true; fi
          fi
          # 新規事業②：世界向けAI/SaaSツール アフィリメディア（_drafts は配信しない）
          if [ -d apps/ai-tools-guide ]; then
            mkdir -p _site/ai-tools
            cp apps/ai-tools-guide/*.html _site/ai-tools/ 2>/dev/null || true
            [ -f apps/ai-tools-guide/aff-links.js ] && cp apps/ai-tools-guide/aff-links.js _site/ai-tools/aff-links.js
          fi
          # 無料Webツール（営業導線・集客）も公開
          for t in freelance-rate-calculator invoice-generator ai-prompt-builder ai-shindan chatbot-widget; do
            if [ -f "apps/$t/index.html" ]; then
              mkdir -p "_site/$t"
              cp "apps/$t/index.html" "_site/$t/index.html"
            fi
          done
          # チャットボットの本体JSも配信
          [ -f apps/chatbot-widget/chatbot.js ] && cp apps/chatbot-widget/chatbot.js _site/chatbot-widget/chatbot.js
          # 到達計測（GA4）共有スクリプト — 全ページが /agent-team/analytics.js を読む
          [ -f apps/ai-agency-hp/analytics.js ] && cp apps/ai-agency-hp/analytics.js _site/analytics.js
          [ -f apps/ai-agency-hp/robots.txt ] && cp apps/ai-agency-hp/robots.txt _site/robots.txt
          [ -f apps/ai-agency-hp/sitemap.xml ] && cp apps/ai-agency-hp/sitemap.xml _site/sitemap.xml
          # IndexNow キーファイル（検索エンジン自動通知の所有権確認用）
          for k in apps/ai-agency-hp/*.txt; do
            case "$k" in *robots.txt) ;; *) [ -f "$k" ] && cp "$k" "_site/$(basename "$k")";; esac
          done
          # Google Search Console 所有権確認ファイル
          for g in apps/ai-agency-hp/google*.html; do
            [ -f "$g" ] && cp "$g" "_site/$(basename "$g")"
          done
          # 英語SEO記事（海外からの検索流入を自動化）
          if [ -d apps/ai-agency-hp/blog ]; then mkdir -p _site/blog; cp apps/ai-agency-hp/blog/*.html _site/blog/ 2>/dev/null || true; fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      # デプロイ後、検索エンジンに全URLを自動通知（IndexNow・無料・非致命）。
      # 「世界に広める」の能動的な一押し＝更新のたびBing/Yandex等へ即時通知。
      - name: Notify search engines (IndexNow)
        if: success()
        run: python3 scripts/indexnow_ping.py || true
