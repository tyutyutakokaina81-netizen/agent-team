name: Deploy English SEO site to GitHub Pages

# 英語SEOサイト（site/build.py が CMO/outputs の ## English から生成）を公開する。
# 共存方針：英語サイト=ルート、既存の tavern.html=/tavern/（build.py が退避コピー）。
# 海外Google検索に強い所有面を持つ（North Star=海外読者）。

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "CMO/outputs/**"
      - "tavern.html"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: pages
        name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Build static site (zero-dependency Python)
        run: python3 site/build.py
        env:
          # Pages の実URL（プロジェクトサブパス/独自ドメイン）を自動採用＝内部リンク/canonicalが崩れない
          SITE_BASE_URL: ${{ steps.pages.outputs.base_url }}
          SITE_NAME: ${{ vars.SITE_NAME }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
