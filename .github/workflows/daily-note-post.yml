name: daily-note-post

# 毎朝07:00 JST (= 22:00 UTC前日) にフルパイプラインを起動する。
# パイプライン: ①記事生成 → ②サムネ生成 → ③note投稿
# 必要なSecrets:
#   NOTE_EMAIL, NOTE_PASSWORD (または NOTE_SESSION_COOKIE)
#   ANTHROPIC_API_KEY  (記事生成)
#   OPENAI_API_KEY     (サムネ生成、なければスキップ)

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "実行モード: full(全部) / generate_only(記事生成のみ) / post_only(投稿のみ) / dry_run(ログイン確認のみ)"
        required: false
        default: "full"
      article_path:
        description: "post_only時に指定する記事パス（空=最新の未投稿）"
        required: false
        default: ""
  # Claudeがpush経由で自動起動できるようにする
  # triggers/*.txt の作成/更新で起動。誤起動を防ぐためpaths限定。
  push:
    branches:
      - claude/article-with-thumbnails-2q00y
      - main
    paths:
      - "projects/2026-05-20_note記事毎日自動投稿/triggers/**"

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: projects/2026-05-20_note記事毎日自動投稿/scripts
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-image.txt
          playwright install --with-deps chromium

      - name: Determine effective mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # トリガーファイル名でモード判定:
            # triggers/run-*-full.txt -> full / -dry.txt -> dry_run / その他 -> dry_run
            if ls projects/2026-05-20_note記事毎日自動投稿/triggers/run-*-full.txt 2>/dev/null | head -1 | grep -q .; then
              EFFECTIVE_MODE="full"
            else
              EFFECTIVE_MODE="dry_run"
            fi
          elif [ -n "${{ github.event.inputs.mode }}" ]; then
            EFFECTIVE_MODE="${{ github.event.inputs.mode }}"
          else
            EFFECTIVE_MODE="full"
          fi
          echo "mode=$EFFECTIVE_MODE" >> $GITHUB_OUTPUT
          echo "[INFO] Effective mode: $EFFECTIVE_MODE"

      - name: Generate article
        id: gen_article
        if: ${{ steps.mode.outputs.mode != 'post_only' && steps.mode.outputs.mode != 'dry_run' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: projects/2026-05-20_note記事毎日自動投稿/scripts
        run: |
          OUT=$(python generate_article.py | tee /dev/stderr | tail -1)
          echo "article_path=$OUT" >> $GITHUB_OUTPUT

      - name: Generate thumbnail
        if: ${{ steps.gen_article.outputs.article_path != '' && env.OPENAI_API_KEY != '' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        working-directory: projects/2026-05-20_note記事毎日自動投稿/scripts
        run: |
          python generate_thumbnail.py "${{ github.workspace }}/${{ steps.gen_article.outputs.article_path }}" || echo "[WARN] サムネ生成に失敗、本文のみで投稿を継続"

      - name: Commit generated assets
        if: ${{ steps.mode.outputs.mode != 'post_only' && steps.mode.outputs.mode != 'dry_run' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CMO/outputs/ projects/2026-05-20_note記事毎日自動投稿/assets/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: 本日の記事とサムネを自動生成 [skip ci]"
          git push || true

      - name: Post to note.com
        if: ${{ steps.mode.outputs.mode != 'generate_only' }}
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_SESSION_COOKIE: ${{ secrets.NOTE_SESSION_COOKIE }}
          ARTICLE_PATH: ${{ github.event.inputs.article_path || steps.gen_article.outputs.article_path }}
          DRY_RUN: ${{ steps.mode.outputs.mode == 'dry_run' && 'true' || 'false' }}
        working-directory: projects/2026-05-20_note記事毎日自動投稿/scripts
        run: python post_to_note.py

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: note-post-debug
          path: |
            projects/2026-05-20_note記事毎日自動投稿/scripts/debug_*.png
            projects/2026-05-20_note記事毎日自動投稿/scripts/debug_*.html
          if-no-files-found: ignore
          retention-days: 7

      - name: Save run result (always)
        if: always()
        working-directory: projects/2026-05-20_note記事毎日自動投稿
        run: |
          mkdir -p runs
          STATUS="${{ job.status }}"
          MODE="${{ steps.mode.outputs.mode }}"
          cat > runs/latest.json <<EOF
          {
            "run_id": "${{ github.run_id }}",
            "run_number": "${{ github.run_number }}",
            "event": "${{ github.event_name }}",
            "mode": "${MODE}",
            "status": "${STATUS}",
            "started_at": "$(date -u -d "@$(($(date +%s) - SECONDS))" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u +%Y-%m-%dT%H:%M:%SZ)",
            "finished_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "log_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF
          cat runs/latest.json

      - name: Commit run result and state (always)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin ${{ github.ref_name }} || true
          git add projects/2026-05-20_note記事毎日自動投稿/state/ projects/2026-05-20_note記事毎日自動投稿/runs/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: ワークフロー実行結果を記録 [skip ci]"
          git push origin ${{ github.ref_name }} || true
