name: daily-note-post

# 毎朝07:00 JST (= 22:00 UTC前日) に起動して、その日のnote記事を自動投稿する。
# 認証情報は GitHub repository Settings → Secrets で設定する。
# 手動実行も可能 (workflow_dispatch)。

on:
  schedule:
    - cron: "0 22 * * *"   # 22:00 UTC = 07:00 JST
  workflow_dispatch:
    inputs:
      article_path:
        description: "投稿する記事のリポジトリ内パス（空=最新の未投稿記事を自動選択）"
        required: false
        default: ""
      dry_run:
        description: "true=ログイン確認のみ、投稿はスキップ"
        required: false
        default: "false"

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # 投稿状態をリポジトリにコミット
      issues: write     # 失敗時にIssue起票

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: projects/2026-05-20_note記事毎日自動投稿/scripts
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Post to note.com
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_SESSION_COOKIE: ${{ secrets.NOTE_SESSION_COOKIE }}
          ARTICLE_PATH: ${{ github.event.inputs.article_path }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        working-directory: projects/2026-05-20_note記事毎日自動投稿/scripts
        run: python post_to_note.py

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: note-post-debug
          path: |
            projects/2026-05-20_note記事毎日自動投稿/scripts/debug_*.png
            projects/2026-05-20_note記事毎日自動投稿/scripts/debug_*.html
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit posted state
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add projects/2026-05-20_note記事毎日自動投稿/state/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: note投稿状態を更新 [skip ci]"
          git push || true
