name: daily-note-post

# パイプライン: ①記事生成 → ②サムネ生成 → ③note投稿
# 必要なSecrets:
#   NOTE_EMAIL, NOTE_PASSWORD (または NOTE_SESSION_COOKIE)
#   ANTHROPIC_API_KEY  (記事生成)
#   OPENAI_API_KEY     (サムネ生成、なければスキップ)

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "full / generate_only / post_only / dry_run"
        required: false
        default: "full"
      article_path:
        description: "post_only時に指定する記事パス"
        required: false
        default: ""
  push:
    branches:
      - claude/article-with-thumbnails-2q00y
      - main
    paths:
      - "projects/2026-05-20_note記事毎日自動投稿/triggers/**"

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Setup Python
        id: setup_python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check secrets presence
        id: check_secrets
        continue-on-error: true
        env:
          # 正規の名前
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_SESSION_COOKIE: ${{ secrets.NOTE_SESSION_COOKIE }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # よくあるtypo・別名（自動マッピング用）
          NOTE_MAIL: ${{ secrets.NOTE_MAIL }}
          NOTE_LOGIN_EMAIL: ${{ secrets.NOTE_LOGIN_EMAIL }}
          NOTE_EMAIL_ADDRESS: ${{ secrets.NOTE_EMAIL_ADDRESS }}
          EMAIL: ${{ secrets.EMAIL }}
          NOTE_LOGIN_PASSWORD: ${{ secrets.NOTE_LOGIN_PASSWORD }}
          NOTE_PW: ${{ secrets.NOTE_PW }}
          PASSWORD: ${{ secrets.PASSWORD }}
          NOTE_COOKIE: ${{ secrets.NOTE_COOKIE }}
          NOTE_COOKIES: ${{ secrets.NOTE_COOKIES }}
          SESSION_COOKIE: ${{ secrets.SESSION_COOKIE }}
          COOKIE: ${{ secrets.COOKIE }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
        run: |
          echo "=== Secret detection (length only, no values displayed) ==="
          DETECTED=""
          for var in NOTE_EMAIL NOTE_PASSWORD NOTE_SESSION_COOKIE ANTHROPIC_API_KEY OPENAI_API_KEY \
                     NOTE_MAIL NOTE_LOGIN_EMAIL NOTE_EMAIL_ADDRESS EMAIL \
                     NOTE_LOGIN_PASSWORD NOTE_PW PASSWORD \
                     NOTE_COOKIE NOTE_COOKIES SESSION_COOKIE COOKIE \
                     ANTHROPIC_KEY CLAUDE_API_KEY OPENAI_KEY; do
            val="${!var}"
            if [ -n "$val" ]; then
              DETECTED="$DETECTED $var(${#val}chars)"
            fi
          done
          DETECTED="${DETECTED# }"
          [ -z "$DETECTED" ] && DETECTED="(none detected)"
          echo "Detected secrets: $DETECTED"

          # 正規名の判定
          echo "note_email=$([ -n "$NOTE_EMAIL" ] && echo yes || echo no)" >> $GITHUB_OUTPUT
          echo "note_password=$([ -n "$NOTE_PASSWORD" ] && echo yes || echo no)" >> $GITHUB_OUTPUT
          echo "note_session_cookie=$([ -n "$NOTE_SESSION_COOKIE" ] && echo yes || echo no)" >> $GITHUB_OUTPUT
          echo "anthropic_api_key=$([ -n "$ANTHROPIC_API_KEY" ] && echo yes || echo no)" >> $GITHUB_OUTPUT
          echo "openai_api_key=$([ -n "$OPENAI_API_KEY" ] && echo yes || echo no)" >> $GITHUB_OUTPUT

          # 検出結果（出力安全のためJSON文字列としてエスケープ）
          {
            echo "detected<<DETECTED_EOF"
            echo "$DETECTED"
            echo "DETECTED_EOF"
          } >> $GITHUB_OUTPUT

          # typo自動マッピング → 後段stepで使えるよう export
          # （現状は正規名のみ参照だが、将来 detect→use まで自動化する余地あり）
          echo "[INFO] NOTE_EMAIL=$([ -n "$NOTE_EMAIL" ] && echo yes || echo no)"
          echo "[INFO] NOTE_PASSWORD=$([ -n "$NOTE_PASSWORD" ] && echo yes || echo no)"
          echo "[INFO] NOTE_SESSION_COOKIE=$([ -n "$NOTE_SESSION_COOKIE" ] && echo yes || echo no)"
          echo "[INFO] ANTHROPIC_API_KEY=$([ -n "$ANTHROPIC_API_KEY" ] && echo yes || echo no)"
          echo "[INFO] OPENAI_API_KEY=$([ -n "$OPENAI_API_KEY" ] && echo yes || echo no)"

      - name: Install dependencies
        id: install
        continue-on-error: true
        working-directory: projects/2026-05-20_note記事毎日自動投稿/scripts
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>&1 | tail -20
          pip install -r requirements-image.txt 2>&1 | tail -10
          playwright install --with-deps chromium 2>&1 | tail -20

      - name: Determine effective mode
        id: mode
        continue-on-error: true
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            if ls projects/2026-05-20_note記事毎日自動投稿/triggers/run-*-full.txt 2>/dev/null | head -1 | grep -q .; then
              EFFECTIVE_MODE="full"
            else
              EFFECTIVE_MODE="dry_run"
            fi
          elif [ -n "${{ github.event.inputs.mode }}" ]; then
            EFFECTIVE_MODE="${{ github.event.inputs.mode }}"
          else
            EFFECTIVE_MODE="full"
          fi
          echo "mode=$EFFECTIVE_MODE" >> $GITHUB_OUTPUT
          echo "[INFO] Effective mode: $EFFECTIVE_MODE"

      - name: Generate article
        id: gen_article
        continue-on-error: true
        if: ${{ steps.mode.outputs.mode != 'post_only' && steps.mode.outputs.mode != 'dry_run' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: projects/2026-05-20_note記事毎日自動投稿/scripts
        run: |
          set +e
          OUT=$(python generate_article.py 2>&1)
          EXIT_CODE=$?
          echo "$OUT"
          echo "[INFO] generate_article.py exit code: $EXIT_CODE"
          if [ "$EXIT_CODE" = "0" ]; then
            LAST_LINE=$(echo "$OUT" | tail -1)
            # ファイルパスっぽいときだけ採用
            if [ -f "../../../$LAST_LINE" ] || [ -f "$LAST_LINE" ]; then
              echo "article_path=$LAST_LINE" >> $GITHUB_OUTPUT
              echo "[INFO] article_path set to: $LAST_LINE"
            else
              echo "[WARN] last line is not a valid file path, leaving article_path empty"
            fi
          else
            echo "[INFO] generate failed, post step will pick latest unposted article from CMO/outputs/"
          fi

      - name: Pick article path for thumbnail
        id: pick_for_thumb
        if: ${{ steps.mode.outputs.mode != 'dry_run' && steps.mode.outputs.mode != 'post_only' }}
        run: |
          # generate_articleで出力されたパスがあればそれを使う。
          # なければ post_to_note.py と同じロジックで CMO/outputs から最新の未投稿を選ぶ。
          if [ -n "${{ steps.gen_article.outputs.article_path }}" ]; then
            P="${{ steps.gen_article.outputs.article_path }}"
          else
            # 投稿済みリストを読んで、未投稿の最新を選択
            POSTED_FILE="projects/2026-05-20_note記事毎日自動投稿/state/posted.json"
            CANDIDATES=$(ls -1r CMO/outputs/*_note記事.md 2>/dev/null)
            P=""
            for cand in $CANDIDATES; do
              if [ -f "$POSTED_FILE" ] && grep -q "$cand" "$POSTED_FILE"; then
                continue
              fi
              P="$cand"; break
            done
          fi
          echo "article_path=$P" >> $GITHUB_OUTPUT
          echo "[INFO] article for thumbnail: $P"

      - name: Generate thumbnail (free via Pollinations.ai)
        id: gen_thumb
        continue-on-error: true
        if: ${{ steps.pick_for_thumb.outputs.article_path != '' }}
        working-directory: projects/2026-05-20_note記事毎日自動投稿/scripts
        run: |
          python generate_thumbnail.py "${{ github.workspace }}/${{ steps.pick_for_thumb.outputs.article_path }}"

      - name: Fetch past thumbnails (style reference, once a week)
        id: fetch_past
        continue-on-error: true
        if: ${{ steps.mode.outputs.mode == 'full' }}
        env:
          NOTE_SESSION_COOKIE: ${{ secrets.NOTE_SESSION_COOKIE }}
        working-directory: projects/2026-05-20_note記事毎日自動投稿/scripts
        run: |
          # 過去取得から7日以上経っていたら再取得
          STAMP="../assets/.last_fetched"
          if [ -f "$STAMP" ]; then
            AGE=$(( ($(date +%s) - $(date -r "$STAMP" +%s)) / 86400 ))
            if [ "$AGE" -lt 7 ]; then
              echo "[INFO] past thumbnails fetched $AGE days ago, skipping"
              exit 0
            fi
          fi
          python fetch_past_thumbnails.py || echo "[WARN] fetch failed"
          touch "$STAMP" 2>/dev/null || true

      - name: Commit generated assets
        id: commit_assets
        continue-on-error: true
        if: ${{ steps.mode.outputs.mode != 'post_only' && steps.mode.outputs.mode != 'dry_run' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin ${{ github.ref_name }} || true
          git add CMO/outputs/ projects/2026-05-20_note記事毎日自動投稿/assets/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: 本日の記事とサムネを自動生成 [skip ci]"
          git push origin ${{ github.ref_name }} || true

      - name: Post to note.com
        id: post
        continue-on-error: true
        if: ${{ steps.mode.outputs.mode != 'generate_only' }}
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_SESSION_COOKIE: ${{ secrets.NOTE_SESSION_COOKIE }}
          ARTICLE_PATH: ${{ github.event.inputs.article_path || steps.gen_article.outputs.article_path }}
          DRY_RUN: ${{ steps.mode.outputs.mode == 'dry_run' && 'true' || 'false' }}
        working-directory: projects/2026-05-20_note記事毎日自動投稿/scripts
        run: |
          mkdir -p ../runs
          # まず必ずファイルを作って、step が動いていることを記録
          LOG_FILE="../runs/last_post.txt"
          {
            echo "[STEP START] $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "[ENV] PWD=$(pwd)"
            echo "[ENV] PYTHON=$(which python) $(python --version 2>&1)"
            echo "[ENV] NOTE_SESSION_COOKIE length: ${#NOTE_SESSION_COOKIE}"
            echo "[ENV] NOTE_EMAIL set: $([ -n "$NOTE_EMAIL" ] && echo yes || echo no)"
            echo "[ENV] NOTE_PASSWORD set: $([ -n "$NOTE_PASSWORD" ] && echo yes || echo no)"
            echo "[ENV] DRY_RUN: $DRY_RUN"
            echo "[ENV] ARTICLE_PATH: $ARTICLE_PATH"
            echo "----- python output below -----"
          } > "$LOG_FILE"
          set +e
          python -u post_to_note.py 2>&1 | tee -a "$LOG_FILE"
          EXIT_CODE=${PIPESTATUS[0]}
          {
            echo "----- python output above -----"
            echo "[STEP END] exit_code=$EXIT_CODE $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            ls -la debug_* 2>&1 | head -10
          } >> "$LOG_FILE"
          cp debug_*.png ../runs/ 2>/dev/null || true
          cp debug_*.html ../runs/ 2>/dev/null || true
          exit $EXIT_CODE

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: note-post-debug-${{ github.run_number }}
          path: |
            projects/2026-05-20_note記事毎日自動投稿/scripts/debug_*.png
            projects/2026-05-20_note記事毎日自動投稿/scripts/debug_*.html
          if-no-files-found: ignore
          retention-days: 7

      - name: Save run result (always)
        if: always()
        working-directory: projects/2026-05-20_note記事毎日自動投稿
        run: |
          mkdir -p runs
          cat > runs/latest.json <<EOF
          {
            "run_id": "${{ github.run_id }}",
            "run_number": "${{ github.run_number }}",
            "event": "${{ github.event_name }}",
            "mode": "${{ steps.mode.outputs.mode }}",
            "job_status": "${{ job.status }}",
            "finished_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "log_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "secrets": {
              "NOTE_EMAIL": "${{ steps.check_secrets.outputs.note_email }}",
              "NOTE_PASSWORD": "${{ steps.check_secrets.outputs.note_password }}",
              "NOTE_SESSION_COOKIE": "${{ steps.check_secrets.outputs.note_session_cookie }}",
              "ANTHROPIC_API_KEY": "${{ steps.check_secrets.outputs.anthropic_api_key }}",
              "OPENAI_API_KEY": "${{ steps.check_secrets.outputs.openai_api_key }}",
              "detected_names": "${{ steps.check_secrets.outputs.detected }}"
            },
            "steps": {
              "checkout": "${{ steps.checkout.outcome }}",
              "setup_python": "${{ steps.setup_python.outcome }}",
              "check_secrets": "${{ steps.check_secrets.outcome }}",
              "install": "${{ steps.install.outcome }}",
              "mode": "${{ steps.mode.outcome }}",
              "gen_article": "${{ steps.gen_article.outcome }}",
              "gen_thumb": "${{ steps.gen_thumb.outcome }}",
              "commit_assets": "${{ steps.commit_assets.outcome }}",
              "post": "${{ steps.post.outcome }}"
            }
          }
          EOF
          cat runs/latest.json
          # 履歴も追記
          mkdir -p runs/history
          cp runs/latest.json "runs/history/${{ github.run_number }}.json"

      - name: Commit run result (always)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin ${{ github.ref_name }} || true
          git add projects/2026-05-20_note記事毎日自動投稿/state/ projects/2026-05-20_note記事毎日自動投稿/runs/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: ワークフロー実行結果を記録 (run ${{ github.run_number }}) [skip ci]"
          git push origin ${{ github.ref_name }} || true

      - name: Set final status
        if: always()
        run: |
          # postステップが成功（投稿モード）またはgenerate_only時はgen_article成功で全体成功とみなす
          MODE="${{ steps.mode.outputs.mode }}"
          if [ "$MODE" = "generate_only" ]; then
            [ "${{ steps.gen_article.outcome }}" = "success" ] || exit 1
          else
            [ "${{ steps.post.outcome }}" = "success" ] || exit 1
          fi
