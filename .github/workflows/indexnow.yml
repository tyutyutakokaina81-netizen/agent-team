name: IndexNow ping (Bing/Yandex 等へ自動通知)

# サイト更新時に、検索エンジン(IndexNow対応=Bing/Yandex/Seznam/Naver等)へ
# 「ページが更新された」と自動通知する。GitHubのサーバー上で動くため、
# code側のネット制約(A1)とは無関係に動作する。owner操作ゼロ・無料。
# ※ Google は IndexNow 非対応のため、Google は Search Console 登録が別途必要。

on:
  push:
    branches: [main]
    paths:
      - 'apps/ai-agency-hp/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: indexnow
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Submit sitemap URLs to IndexNow
        run: |
          python3 - <<'PY'
          import json, re, urllib.request
          KEY = "d0b745641195c59335fc4aed0cdf134b"
          HOST = "tyutyutakokaina81-netizen.github.io"
          KEY_LOCATION = f"https://{HOST}/agent-team/{KEY}.txt"
          # sitemap.xml から URL を抽出
          sm = open("apps/ai-agency-hp/sitemap.xml", encoding="utf-8").read()
          urls = re.findall(r"<loc>(.*?)</loc>", sm)
          urls = [u.strip() for u in urls if u.strip()]
          if not urls:
              print("no urls found"); raise SystemExit(0)
          body = json.dumps({
              "host": HOST,
              "key": KEY,
              "keyLocation": KEY_LOCATION,
              "urlList": urls,
          }).encode("utf-8")
          req = urllib.request.Request(
              "https://api.indexnow.org/indexnow",
              data=body,
              headers={"Content-Type": "application/json; charset=utf-8"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=30) as r:
                  print("IndexNow submitted:", len(urls), "urls, status", r.status)
          except Exception as e:
              print("IndexNow ping failed (non-fatal):", e)
          PY
