name: Integrate worker branches (safe auto-merge)

# 完全自動化の要：ワーカー(worker/**)が push したら、
#  ①変更が"許可領域だけ"かを技術的に検査（安全規程の最小権限を強制）
#  ②安全なら main へ自動統合（→ pages.yml が自動公開）
#  ③許可外を1つでも触っていたら統合せず失敗（＝mainは汚れない）
# これにより、外部AIに write 権限を渡しても「正本(STATE/台帳/.github/秘密)」は守られる。

on:
  push:
    branches: ['worker/**']

permissions:
  contents: write

concurrency:
  group: worker-integrate
  cancel-in-progress: false

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate allowlist & auto-merge to main
        run: |
          set -e
          BR="${GITHUB_REF#refs/heads/}"
          git fetch origin main
          CHANGED=$(git diff --name-only origin/main...HEAD || true)
          echo "== changed files on $BR =="; echo "$CHANGED"
          # ワーカーが触ってよい領域（安全規程の allowlist）
          ALLOW='^(CMO/outputs/|site/og/|site/i18n/|ops/outbox/|ops/processed/|drafts/)'
          BAD=$(echo "$CHANGED" | sed '/^$/d' | grep -vE "$ALLOW" || true)
          if [ -n "$BAD" ]; then
            echo "::error::$BR touched files OUTSIDE allowlist. NOT merging (safety)."
            echo "$BAD"
            exit 1
          fi
          if [ -z "$(echo "$CHANGED" | sed '/^$/d')" ]; then
            echo "no changes vs main; nothing to integrate"; exit 0
          fi
          git config user.name "worker-integrator[bot]"
          git config user.email "actions@github.com"
          git checkout main
          git merge --no-ff "origin/$BR" -m "auto-integrate $BR (allowlist verified)"
          git push origin main
          echo "merged $BR -> main (safe)"
