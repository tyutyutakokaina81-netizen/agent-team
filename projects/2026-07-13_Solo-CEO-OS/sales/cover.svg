<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#131a2e"/>
    </linearGradient>
    <linearGradient id="ceo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- subtle grid dots -->
  <g fill="#ffffff" opacity="0.04">
    <circle cx="120" cy="120" r="2"/><circle cx="220" cy="120" r="2"/><circle cx="1060" cy="140" r="2"/>
    <circle cx="1160" cy="220" r="2"/><circle cx="180" cy="600" r="2"/><circle cx="1120" cy="600" r="2"/>
  </g>

  <!-- Title -->
  <text x="640" y="112" text-anchor="middle" fill="#ffffff" font-size="72" font-weight="800" letter-spacing="1">Solo CEO OS</text>
  <text x="640" y="158" text-anchor="middle" fill="#9fb2d6" font-size="26" font-weight="500">Run your business like a company — with AI executives</text>

  <!-- connectors -->
  <g stroke="#33507f" stroke-width="2" fill="none" opacity="0.9">
    <path d="M640 250 V300"/>
    <path d="M160 360 H1120" transform="translate(0,-30)"/>
    <path d="M160 330 V360"/><path d="M320 330 V360"/><path d="M480 330 V360"/>
    <path d="M800 330 V360"/><path d="M960 330 V360"/><path d="M1120 330 V360"/>
  </g>

  <!-- CEO box -->
  <g filter="url(#soft)">
    <rect x="520" y="196" width="240" height="60" rx="12" fill="url(#ceo)"/>
  </g>
  <text x="640" y="226" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700">CEO</text>
  <text x="640" y="246" text-anchor="middle" fill="#dbe6ff" font-size="14" font-weight="500">— that's you</text>

  <!-- executive row -->
  <!-- positions centered under the horizontal line at x = 160,320,480,800,960,1120 -->
  <g font-weight="700">
    <!-- CMO -->
    <g filter="url(#soft)"><rect x="70" y="360" width="180" height="120" rx="14" fill="#1b2540" stroke="#2f3f66" stroke-width="1.5"/></g>
    <text x="160" y="410" text-anchor="middle" fill="#7dd3fc" font-size="26">CMO</text>
    <text x="160" y="440" text-anchor="middle" fill="#aab8d6" font-size="15" font-weight="500">Marketing</text>
    <!-- CPO -->
    <g filter="url(#soft)"><rect x="230" y="360" width="180" height="120" rx="14" fill="#1b2540" stroke="#2f3f66" stroke-width="1.5"/></g>
    <text x="320" y="410" text-anchor="middle" fill="#a5b4fc" font-size="26">CPO</text>
    <text x="320" y="440" text-anchor="middle" fill="#aab8d6" font-size="15" font-weight="500">Product</text>
    <!-- CFO -->
    <g filter="url(#soft)"><rect x="390" y="360" width="180" height="120" rx="14" fill="#1b2540" stroke="#2f3f66" stroke-width="1.5"/></g>
    <text x="480" y="410" text-anchor="middle" fill="#6ee7b7" font-size="26">CFO</text>
    <text x="480" y="440" text-anchor="middle" fill="#aab8d6" font-size="15" font-weight="500">Finance</text>
    <!-- CSO -->
    <g filter="url(#soft)"><rect x="710" y="360" width="180" height="120" rx="14" fill="#1b2540" stroke="#2f3f66" stroke-width="1.5"/></g>
    <text x="800" y="410" text-anchor="middle" fill="#fca5a5" font-size="26">CSO</text>
    <text x="800" y="440" text-anchor="middle" fill="#aab8d6" font-size="15" font-weight="500">Sales</text>
    <!-- CDO -->
    <g filter="url(#soft)"><rect x="870" y="360" width="180" height="120" rx="14" fill="#1b2540" stroke="#2f3f66" stroke-width="1.5"/></g>
    <text x="960" y="410" text-anchor="middle" fill="#fcd34d" font-size="26">CDO</text>
    <text x="960" y="440" text-anchor="middle" fill="#aab8d6" font-size="15" font-weight="500">Tech / Ops</text>
    <!-- CAO -->
    <g filter="url(#soft)"><rect x="1030" y="360" width="180" height="120" rx="14" fill="#1b2540" stroke="#2f3f66" stroke-width="1.5"/></g>
    <text x="1120" y="410" text-anchor="middle" fill="#c4b5fd" font-size="26">CAO</text>
    <text x="1120" y="440" text-anchor="middle" fill="#aab8d6" font-size="15" font-weight="500">Analytics</text>
  </g>

  <!-- bottom strip -->
  <text x="640" y="586" text-anchor="middle" fill="#e6edfb" font-size="24" font-weight="600">Six AI executives. One rulebook. A memory that never forgets.</text>
  <g>
    <rect x="486" y="616" width="308" height="52" rx="26" fill="#2563eb"/>
    <text x="640" y="650" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700">Works in Claude &amp; ChatGPT · No code</text>
  </g>
</svg>
